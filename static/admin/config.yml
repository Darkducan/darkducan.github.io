backend:
  name: github
  repo: Darkducan/darkducan.github.io
  branch: master
  base_url: https://REPLACE-WITH-YOUR-OAUTH-PROXY.vercel.app
  auth_endpoint: auth

publish_mode: simple
media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Blog Posts"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Tag", name: "tag", widget: "string", hint: "e.g. UX Patterns, Layout, Motion" }
      - { label: "Cover Image", name: "cover", widget: "image", required: false }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "1-2 sentences shown on the homepage card" }
      - { label: "Body", name: "body", widget: "markdown" }
